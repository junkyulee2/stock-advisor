name: Daily Scores and Signals

on:
  schedule:
    # KST 18:30 (after market close) = UTC 09:30
    - cron: '30 9 * * 1-5'
    # KST 09:30 / 11:30 / 13:30 intraday sell-signal checks
    - cron: '30 0 * * 1-5'
    - cron: '30 2 * * 1-5'
    - cron: '30 4 * * 1-5'
    # KST 15:10 post-close snapshot
    - cron: '10 6 * * 1-5'
    # Weekend: single Saturday run (KST 18:30) for cleanup + heartbeat.
    # Korean holidays on weekdays are handled downstream — pipeline no-ops
    # when no new data, and `git diff --cached --quiet` skips empty commits.
    - cron: '30 9 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write   # required to commit data/ back

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine mode (time-of-day)
        id: mode
        run: |
          HOUR_UTC=$(date -u +%H)
          if [ "$HOUR_UTC" -eq 9 ] || [ "$HOUR_UTC" -eq 6 ]; then
            echo "mode=scores" >> $GITHUB_OUTPUT
          else
            echo "mode=signals" >> $GITHUB_OUTPUT
          fi
          echo "Selected mode: $(cat $GITHUB_OUTPUT)"

      - name: Run pipeline
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_daily.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit updated data
        run: |
          git config user.name "stock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes to commit"
          else
            git commit -m "chore(bot): update data [${{ steps.mode.outputs.mode }}] $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
