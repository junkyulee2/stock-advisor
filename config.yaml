# 춘큐 스탁 어드바이져 Configuration
# Strategy: Momentum x Supply-Demand + Quality Guard

universe:
  markets: [KOSPI, KOSDAQ]
  # 2026-05-02: 500 → 200 based on replay validation (docs/replay_threshold_2026-05-02.md).
  # 200 universe alpha -0.96% vs 500 universe alpha -3.99%. 시총 상위가
  # 더 안정적이고 80점대 초반 손실 픽 비율이 낮음.
  top_n_by_market_cap: 200

  # Pre-filters (exclude before scoring)
  filters:
    min_avg_trading_value_krw: 3_000_000_000   # 30억원 일평균 거래대금
    max_debt_ratio: 200                          # 부채비율 200% 이하
    require_positive_net_income: true           # 최근 4분기 흑자
    exclude_admin_issues: true                   # 관리종목 제외
    exclude_recent_earnings_days: 3              # 실적발표 전후 3일 제외

# Factor weights (sum to 100) — recalibrated 2026-04-25 (factor research)
# See docs/factor_research_2026-04-25.md
scoring:
  factors:
    # Phase A-1 (2026-05-02): value 팩터 신규 분리 (가중치 10).
    # Quality에 묻혀있던 PBR_inv/EarningsYield를 순수 저평가 팩터로 독립.
    # 출처: WorldQuant IQC Alpha 3 (Sharpe 2.00) + Fama-French HML +
    # Korea Value-up 정책 모멘텀. IC 백테스트는 Phase A-3에서 검증.
    momentum:       30   # was 35 — 5pt to value
    supply_demand:  25
    quality:        10   # was 15 — 5pt to value (PBR_inv 분리)
    value:          10   # Phase A-1 — pure cheapness (B/P + E/P)
    volatility:     10   # vol_20d strongest 15d signal (IC +0.311 on 2026-04-25)
    mean_reversion: 10   # was 15 — 5pt to iqc_alpha (30d reversion 의미 중첩)
    iqc_alpha:      5    # Phase A-4 — IQC2025 우승 alpha (한국 30d IC +0.32~0.33)

  # Absolute thresholds for each factor (linear interpolation between points).
  # Values are sorted by `value` asc; between points the score is interpolated.
  # Values OUTSIDE the range clamp to the nearest score.
  absolute_thresholds:
    momentum:
      # 20-day return relative to KOSPI (fraction, e.g. 0.08 = +8%)
      rel_return_20d:
        - {value:  0.12, score: 95}
        - {value:  0.08, score: 85}
        - {value:  0.04, score: 70}
        - {value:  0.00, score: 50}
        - {value: -0.05, score: 25}
        - {value: -0.10, score: 5}
      rel_return_60d:
        - {value:  0.20, score: 95}
        - {value:  0.12, score: 85}
        - {value:  0.06, score: 70}
        - {value:  0.00, score: 50}
        - {value: -0.08, score: 25}
        - {value: -0.15, score: 5}
      rel_return_5d:
        - {value:  0.06, score: 95}
        - {value:  0.04, score: 85}
        - {value:  0.02, score: 70}
        - {value:  0.00, score: 50}
        - {value: -0.03, score: 25}
        - {value: -0.06, score: 5}

    supply_demand:
      # 5-day cumulative foreign net-buy KRW / market_cap
      foreign_5d_ratio:
        - {value:  0.006, score: 95}
        - {value:  0.003, score: 85}
        - {value:  0.001, score: 70}
        - {value:  0.000, score: 50}
        - {value: -0.002, score: 25}
        - {value: -0.005, score: 5}
      # 5-day cumulative institution net-buy KRW / market_cap
      institution_5d_ratio:
        - {value:  0.004, score: 95}
        - {value:  0.002, score: 85}
        - {value:  0.0008, score: 70}
        - {value:  0.000, score: 50}
        - {value: -0.0015, score: 25}
        - {value: -0.004, score: 5}
      # consecutive foreign net-buy days (0..5)
      foreign_consecutive:
        - {value: 5, score: 95}
        - {value: 4, score: 85}
        - {value: 3, score: 70}
        - {value: 2, score: 55}
        - {value: 1, score: 40}
        - {value: 0, score: 30}

    quality:
      # Earnings yield = 1/PER (e.g. 0.10 = 10% earnings yield = PER 10)
      earnings_yield:
        - {value: 0.15, score: 95}
        - {value: 0.10, score: 85}
        - {value: 0.07, score: 70}
        - {value: 0.05, score: 50}
        - {value: 0.03, score: 25}
        - {value: 0.00, score: 5}
      # ROE proxy = EPS / BPS
      roe_proxy:
        - {value: 0.20, score: 95}
        - {value: 0.12, score: 85}
        - {value: 0.08, score: 70}
        - {value: 0.05, score: 50}
        - {value: 0.00, score: 25}
      # PBR inverse (1/PBR; higher = cheaper)
      pbr_inv:
        - {value: 2.0, score: 95}
        - {value: 1.2, score: 85}
        - {value: 0.8, score: 70}
        - {value: 0.5, score: 50}
        - {value: 0.2, score: 25}

    # Phase A-1 (2026-05-02): pure value factor thresholds.
    # Calibrated for KOSPI/KOSDAQ context where avg PBR ~0.84 (Korea discount).
    # Tighter thresholds than quality.pbr_inv to reward extreme cheapness.
    value:
      # Earnings yield = 1/PER (higher = cheaper)
      earnings_yield:
        - {value: 0.20, score: 95}   # PER ~5
        - {value: 0.12, score: 85}   # PER ~8
        - {value: 0.08, score: 70}   # PER ~12
        - {value: 0.05, score: 50}   # PER 20 (market avg)
        - {value: 0.03, score: 25}   # PER ~33
        - {value: 0.00, score: 5}    # loss-making or extreme growth premium
      # Book yield = 1/PBR (higher = cheaper). KOSPI median ~1.2/PBR (PBR 0.84).
      book_yield:
        - {value: 2.50, score: 95}   # PBR 0.4 — deep value
        - {value: 1.70, score: 85}   # PBR ~0.6
        - {value: 1.20, score: 70}   # PBR ~0.84 (KOSPI avg)
        - {value: 0.80, score: 50}   # PBR 1.25
        - {value: 0.40, score: 25}   # PBR 2.5
        - {value: 0.20, score: 5}    # PBR 5+ (growth/expensive)

    mean_reversion:
      # RSI oversold: lower RSI when in rebound = higher score
      rsi_when_rebounding:
        - {value: 20, score: 95}
        - {value: 25, score: 85}
        - {value: 30, score: 70}
        - {value: 35, score: 55}
        - {value: 40, score: 30}
        - {value: 50, score: 0}   # not oversold -> no signal
      # BB lower-band bounce: binary signal (0 or 1); applied separately

  # "Top of day" bonus — keeps system usable in ordinary markets
  top_of_day_bonus:
    enabled: true
    min_base_score: 70    # only boost stocks already reasonably strong
    max_bonus: 10          # +10 points for today's top
    top_percentile: 0.01   # top 1% of base scores get full bonus
    secondary_percentile: 0.03  # top 3% get half bonus

  momentum:
    # Relative strength vs KOSPI (percentile within universe)
    # Recalibrated 2026-04-25: ret_60d weak (IC 0.094), boost ret_20d
    return_20d_weight: 65   # was 50
    return_60d_weight: 15   # was 30
    return_5d_weight:  20   # unchanged (strong)

  # Volatility (20-day daily-return std). Percentile-rank scored.
  # Higher volatility = higher score (rewards momentum-friendly names).
  # 2026-04-25: 15d IC +0.311 (strongest single signal). Caveat: bull-market data only.
  volatility:
    lookback: 20

  supply_demand:
    foreign_5d_weight:     40   # Foreign 5-day net buy (KRW)
    institution_5d_weight: 30   # Institution 5-day net buy (KRW)
    foreign_consecutive:   15   # Consecutive buy days (max 5)
    short_ratio_weight:    15   # Low short ratio is positive

  quality:
    roe_weight:            40   # Higher ROE better (sector percentile)
    earnings_yield_weight: 30   # EPS/Price (sector percentile)
    debt_ratio_weight:     20   # Lower debt better
    op_margin_weight:      10   # Operating margin

  # Phase A-1 (2026-05-02): pure value factor sub-weights.
  # 50/50 split between earnings yield (E/P) and book yield (B/P).
  # Both are robust value metrics; 50/50 avoids over-fitting to one.
  value:
    earnings_yield_weight: 50   # 1/PER
    book_yield_weight:     50   # 1/PBR

  # Phase A-4 (2026-05-02): IQC composite. iqc1 and iqc2 are highly correlated
  # so weighted-blend rather than separate factors avoids double-counting.
  iqc_alpha:
    alpha1_weight: 50   # (high+low)/2 - close, normalized
    alpha2_weight: 50   # vwap_proxy reversion / rank(days_since_30d_max)

  mean_reversion:
    # Only applies when signal is present; otherwise 0
    rsi_oversold_weight:   60   # RSI < 35 with upturn
    bb_lower_touch_weight: 40   # Bollinger lower band touched+recovered

# Investment sizing by total score
investment_rules:
  - min_score: 95
    amount_krw: 300000
  - min_score: 90
    amount_krw: 200000
  - min_score: 85
    amount_krw: 100000
  - min_score: 80
    amount_krw: 50000

portfolio_limits:
  max_concurrent_positions: 30
  max_per_sector: 2
  min_score_to_buy: 80
  # Add-to-position (추가 매수 / pyramid)
  add_amount_krw: 100000      # fixed 10만원 per add click
  add_min_score: 80           # only add if today's score >= this
  max_adds_per_position: 3    # safety cap

# Exit rules (in priority order)
sell_rules:
  # Hard rules (ALWAYS trigger, 100% sell)
  hard_stop_loss_pct: -15
  hard_take_profit_partial_pct: 20   # Sell 50% at +20%
  hard_take_profit_partial_ratio: 0.5
  time_stop_days: 20                  # Exit after 20 trading days

  # Soft rules (50% sell on first trigger, 100% on stage2)
  trailing_stop_pct: -8               # From highest since entry
  sell_score_stage1: 60               # Sell 50% if sell_score >= 60
  sell_score_stage2: 80               # Sell 100% if sell_score >= 80

# Sell score weights (higher = more bearish)
sell_scoring:
  momentum_reversal:   35   # 20d return turning negative, below 20MA
  supply_deterioration: 30  # Foreign net sell 2-3d consecutive
  technical_breakdown: 20   # MA5 break + volume expand
  news_negative:       15   # Negative news sentiment

# Backtest requirements (before live trading)
backtest:
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  initial_capital_krw: 1000000
  transaction_cost_pct: 0.3   # Round-trip 0.3%
  slippage_pct: 0.1
  benchmark: "KOSPI"
  # Required to pass before live:
  pass_criteria:
    min_alpha_vs_benchmark: 3.0   # 3%p annual alpha
    max_drawdown_pct: 15
    min_sharpe_ratio: 0.8
    min_win_rate: 0.50

# Market regime detection
regime:
  enabled: true
  lookback_days: 60
  # Use KOSPI 200MA and 20MA slope
  bull:
    kospi_above_200ma: true
    kospi_20ma_slope_positive: true
    weights_override:
      momentum: 50
      supply_demand: 25
      quality: 15
      mean_reversion: 10
  bear:
    kospi_below_200ma: true
    weights_override:
      momentum: 15
      supply_demand: 25
      quality: 40
      mean_reversion: 20
  # Sideways uses default weights

# Notification
notify:
  discord_webhook_env: DISCORD_WEBHOOK_URL
  morning_recommend_time: "08:55"
  sell_check_times: ["09:30", "11:30", "13:30", "15:00"]

# AI Layer (Phase C — Claude Code Max 5x qualitative filter)
# See docs/REDESIGN_2026-05.md for architecture.
ai_layer:
  enabled: true
  # Claude Code CLI binary; auto-detected if null. Override for non-default install.
  claude_cli_path: null
  model: claude-opus-4-7
  # Token budget — separate from user's other Claude usage.
  # Each cold call has ~50K cache_creation overhead (Claude Code's coding system
  # prompt being cached). Daily content ≈ 150K input + 20K output. So:
  # ~220K tok/call × 30 days = ~6.6M/month. Bump if alerts trip too often.
  monthly_budget_tokens: 8_000_000
  # Daily soft cap (warning, doesn't block); hard cap is monthly only.
  daily_warn_tokens: 500_000
  warn_pct: [50, 80]                # Discord alerts at these monthly-budget %s
  fallback_on_cap: true             # Skip AI gracefully when monthly budget hit
  # Score range to evaluate. <70 not worth AI tokens; 70+ to catch borderline picks.
  min_score_for_ai: 70
  # Per-run candidate limit (safety against runaway costs)
  max_candidates_per_run: 50
  # Per-call timeout (seconds). Single batch call processes all candidates.
  timeout_seconds: 180
  # DART disclosure window (days backward)
  dart_lookback_days: 30
  # DART API key env var name (free key from opendart.fss.or.kr)
  dart_api_key_env: DART_API_KEY

# Paths
paths:
  scores_dir: data/scores
  portfolio: data/portfolio.json
  history: data/history.json
  backtest_results: data/backtest
  ai_usage: data/ai_usage.json
  ai_verdicts_dir: data/ai_verdicts
  ai_lessons: data/ai_lessons.md
