services:
  - type: web
    name: chungyu-stock
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: junkyulee2/stock-advisor
      - key: DISCORD_WEBHOOK_URL
        sync: false
